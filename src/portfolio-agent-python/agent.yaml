# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml
kind: hosted
name: portfolio-agent-python
protocols:
  # Responses v2 is the only protocol this Python profile implements. Unlike
  # the C# agent, there is no legacy Invocations 1.0 rollback path here.
  - protocol: responses
    version: 2.0.0
resources:
  cpu: "1"
  memory: 2Gi
environment_variables:
  - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
    value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
  - name: AZURE_AI_PROJECT_ID
    value: ${AZURE_AI_PROJECT_ID}
  - name: AZURE_AI_PROJECT_ENDPOINT
    value: ${FOUNDRY_PROJECT_ENDPOINT}
  - name: BACKEND_MCP_SERVER_URL
    value: ${BACKEND_MCP_SERVER_URL}
  - name: CONTOSO_AGENT_MEMORY_ENDPOINT
    value: ${AGENT_MEMORY_ENDPOINT}
  - name: CONTOSO_AGENT_MEMORY_DATABASE_PREFIX
    value: ${AGENT_MEMORY_PYTHON_DATABASE_PREFIX}
  - name: CONTOSO_AGENT_MEMORY_CONTAINER_NAME
    value: ${AGENT_MEMORY_CONTAINER_NAME}
  - name: CONTOSO_AGENT_MEMORY_SESSION_TTL_SECONDS
    value: "2592000"
  - name: OTEL_INSTRUMENTATION_GENAI_CAPTURE_MESSAGE_CONTENT
    value: "true"
  - name: AZURE_EXPERIMENTAL_ENABLE_GENAI_TRACING
    value: "true"
  - name: OTEL_RESOURCE_ATTRIBUTES
    value: "microsoft.foundry.project.id=${AZURE_AI_PROJECT_ID},gen_ai.azure_ai_project.id=${AZURE_AI_PROJECT_ID}"
